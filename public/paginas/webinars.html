<!DOCTYPE html>
<html lang="es">

<head>
  <title>.:: SEDIR ::.</title>
  <link rel="icon" href="../activos/img_logos/logo-sedir-links.png" type="image/x-icon">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="../activos/css/fonts.css" rel="stylesheet" />

  <link href="/activos/css/style.css" rel="stylesheet" />
  <link href="/activos/css/navbar.css" rel="stylesheet" />
  <link href="/activos/css/footer.css" rel="stylesheet" />
  <link href="/activos/css/responsive.css" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#006b34",
            "primary-dark": "#0b4f30",
            secondary: "#F09734",
            cream: "#F6F1E7",
            mint: "#EEF5EC"
          },
          fontFamily: {
            display: ["Montserrat", "sans-serif"],
            body: ["Libre Franklin", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .hero-webinars-bg {
      background: linear-gradient(135deg, #0b6b45 0%, #0a5c3b 60%, #094c32 100%);
    }

    .webinar-select {
      border: 1px solid #d1d5db;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      color: #374151;
      background: #fff;
    }

    .webinar-select:focus {
      outline: none;
      border-color: #006b34;
      box-shadow: 0 0 0 2px rgba(0, 107, 52, 0.15);
    }
  </style>
</head>

<body class="bg-white text-gray-900 font-body antialiased">
  <div id="navbar-container" class="navbar-loading" data-component="/components/navbar.html"></div>

  <header class="hero-webinars-bg text-white">
    <div class="max-w-7xl mx-auto px-6 md:px-10 pt-28 pb-20 md:pt-32 md:pb-28">
      <!-- Botón volver -->
      <a href="/paginas/publicaciones.html"
        class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 rounded-full px-4 py-2 transition-all duration-300 mb-8">

        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2.5">

          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12H6M6 12l6-6M6 12l6 6" />
        </svg>

        <span class="text-white text-sm font-semibold">
          Volver a Publicaciones
        </span>

      </a>
      <h1 class="font-display font-extrabold text-4xl md:text-5xl leading-tight mb-4">Webinars</h1>
      <p class="text-gray-100/90 text-base md:text-lg max-w-2xl">
        Gracias al apoyo de aliados estratégicos, compartimos grabaciones y materiales de conferencias con expertos
        nacionales e internacionales en distintas áreas del conocimiento agrícola.
      </p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 md:px-10 py-12 md:py-16">

    <div id="proximo-webinar" class="hidden mb-10 bg-cream border-l-4 border-secondary rounded-xl p-6"></div>

    <div class="flex flex-col sm:flex-row flex-wrap items-center gap-4 border-b border-gray-200 pb-6 mb-10">
      <span class="text-gray-600 font-semibold font-display">Buscar webinar:</span>

      <select id="filtro-anio" class="webinar-select">
        <option value="Todos">Todos los años</option>
      </select>

      <select id="filtro-categoria" class="webinar-select">
        <option value="Todos">Todas las categorías</option>
      </select>
    </div>

    <div id="webinars-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <p class="text-sm text-gray-500 col-span-full">Cargando webinars...</p>
    </div>

  </main>

  <div id="footer-container" data-component="/components/footer.html"></div>
  <div id="whatsapp-container" data-component="/components/whatsapp.html"></div>

  <script src="/activos/js/components.js" defer></script>
  <script src="/activos/js/navbar.js" defer></script>
  <script src="/activos/js/webinars.js" defer></script>
  <script src="/activos/js/main.js" defer></script>
</body>

</html>
