<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Administrativo - SEDIR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../activos/css/style.css" />
  <style>
    body {
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }

    .sidebar {
      width: 280px;
    }

    .content {
      margin-left: 300px;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    .nav-link.active {
      background: #f0faf4;
      color: #00944a;
      font-weight: 700;
    }

    .field {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 12px 14px;
      width: 100%;
    }

    .field:focus {
      outline: none;
      border-color: #00944a;
      box-shadow: 0 0 0 4px rgba(0, 148, 74, 0.08);
    }

    .btn-primary {
      background: #00944a;
      color: white;
    }

    .btn-primary:hover {
      background: #007a3d;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <div class="fixed inset-y-0 left-0 sidebar bg-white border-r border-slate-100 p-6 overflow-y-auto">
    <div class="mb-5 text-center">
      <img src="../activos/img_logos/logo-msi.png" alt="SEDIR" class="h-12 object-contain mx-auto" />
      <p class="mt-3 text-xs uppercase tracking-[0.3em] text-slate-400">Panel admin</p>
    </div>
    <nav class="space-y-2 text-slate-700">
      <a href="#" data-view="dashboard" class="nav-link block py-2.5 px-3 rounded-xl hover:bg-slate-50">Dashboard</a>
      <a href="#" data-view="noticias" class="nav-link block py-2.5 px-3 rounded-xl hover:bg-slate-50">Noticias</a>
      <a href="#" data-view="proyectos" class="nav-link block py-2.5 px-3 rounded-xl hover:bg-slate-50">Proyectos</a>
    </nav>
    <div class="mt-8 pt-6 border-t border-slate-100 space-y-3">
      <div class="text-sm text-slate-500">
        Sesión activa: <span id="session-user" class="font-semibold text-slate-700">-</span>
      </div>
      <a href="/paginas/login.html" id="logout-link" class="inline-flex text-sm font-semibold text-red-600">Cerrar
        sesión</a>
    </div>
  </div>

  <main class="content p-6 md:p-8">
    <header class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between mb-8">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Administración</p>
        <h1 class="text-3xl font-bold text-slate-900">CRUD de noticias y proyectos</h1>
      </div>
      <div class="text-sm text-slate-500" id="status-line">Listo para administrar contenido público</div>
    </header>

    <section id="main-content" class="space-y-6"></section>
  </main>

  <script>
    const AUTH_TOKEN_KEY = 'sedir_admin_token';
    const AUTH_USER_KEY = 'sedir_admin_user';

    const appState = {
      view: 'dashboard',
      noticias: [],
      proyectos: [],
      editingNoticiaId: null,
      editingProyectoId: null,
      authUser: null,
    };

    const content = document.getElementById('main-content');
    const statusLine = document.getElementById('status-line');
    const sessionUser = document.getElementById('session-user');
    const navLinks = Array.from(document.querySelectorAll('[data-view]'));

    function getToken() {
      return localStorage.getItem(AUTH_TOKEN_KEY) || '';
    }

    function clearAuth() {
      localStorage.removeItem(AUTH_TOKEN_KEY);
      localStorage.removeItem(AUTH_USER_KEY);
    }

    function updateSessionUserLabel() {
      sessionUser.textContent = appState.authUser?.nombre || appState.authUser?.email || 'admin';
    }

    document.getElementById('logout-link').addEventListener('click', function () {
      clearAuth();
    });

    function setStatus(message) {
      statusLine.textContent = message;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(value) {
      if (!value) return 'Sin fecha';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleDateString('es-PE', { year: 'numeric', month: 'short', day: '2-digit' });
    }

    function formatDateForInput(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toISOString().slice(0, 10);
    }

    async function requestJson(path, options) {
      const token = getToken();
      const providedHeaders = options?.headers || {};
      const headers = {
        'Content-Type': 'application/json',
        ...providedHeaders,
      };

      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }

      const response = await fetch(path, {
        ...options,
        headers,
      });

      const isJson = response.headers.get('content-type')?.includes('application/json');
      const data = isJson ? await response.json() : null;

      if (!response.ok) {
        if (response.status === 401) {
          clearAuth();
          window.location.href = '/paginas/login.html';
        }

        const message = data?.error || 'No se pudo completar la operación';
        const details = Array.isArray(data?.missingFields) && data.missingFields.length
          ? ` Faltan: ${data.missingFields.join(', ')}`
          : '';
        throw new Error(message + details);
      }

      return data;
    }

    async function ensureAuthenticated() {
      const token = getToken();

      if (!token) {
        window.location.href = '/paginas/login.html';
        return false;
      }

      const data = await requestJson('/api/auth/me');
      appState.authUser = data.user || null;
      localStorage.setItem(AUTH_USER_KEY, JSON.stringify(appState.authUser || {}));
      updateSessionUserLabel();
      return true;
    }

    function dashboardView() {
      return `
        <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
          <div class="card bg-white p-6 border border-slate-100">
            <p class="text-sm text-slate-500">Noticias</p>
            <p class="mt-2 text-3xl font-bold text-slate-900">${appState.noticias.length}</p>
          </div>
          <div class="card bg-white p-6 border border-slate-100">
            <p class="text-sm text-slate-500">Proyectos</p>
            <p class="mt-2 text-3xl font-bold text-slate-900">${appState.proyectos.length}</p>
          </div>
          <div class="card bg-white p-6 border border-slate-100 md:col-span-2 xl:col-span-2">
            <p class="text-sm text-slate-500">Estado</p>
            <p class="mt-2 text-lg font-semibold text-slate-900">Panel listo para publicar cambios inmediatos</p>
            <p class="mt-2 text-sm text-slate-500">Las páginas públicas leen directamente la API, así que cada alta, edición o borrado se refleja al instante al recargar.</p>
          </div>
        </section>
      `;
    }

    function noticiaForm(model) {
  const data = model || {
    titulo: '',
    subtitulo: '',
    fecha: '',
    contenido: '',
    imagen_portada: '',
    id_categoria_noticia: ''
  };

  return `
    <input type="hidden" name="id" value="${escapeHtml(data.id || '')}" />

    <div>
      <label class="text-sm font-semibold text-slate-600">
        Título *
      </label>
      <input
        class="field mt-2"
        name="titulo"
        required
        value="${escapeHtml(data.titulo)}" />
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-600">
        Bajada o Subtítulo *
      </label>

      <textarea
        class="field mt-2 min-h-24"
        name="subtitulo"
        required>${escapeHtml(data.subtitulo || '')}</textarea>
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-600">
        Fecha *
      </label>

      <input
        class="field mt-2"
        type="date"
        name="fecha"
        required
        value="${escapeHtml(formatDateForInput(data.fecha))}" />
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-600">
        Contenido *
      </label>

      <textarea
        class="field mt-2 min-h-40"
        name="contenido"
        required>${escapeHtml(data.contenido)}</textarea>
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-600">
        Imagen portada *
      </label>

      <input
        class="field mt-2"
        name="imagen_portada"
        required
        value="${escapeHtml(data.imagen_portada)}" />
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-600">
        Categoría *
      </label>

      <select
        class="field mt-2"
        name="id_categoria_noticia"
        required>

        <option value="">Seleccione una categoría</option>

        <option value="1" ${String(data.id_categoria_noticia) === '1' ? 'selected' : ''}>
          Agricultura
        </option>

        <option value="2" ${String(data.id_categoria_noticia) === '2' ? 'selected' : ''}>
          Capacitación
        </option>

        <option value="3" ${String(data.id_categoria_noticia) === '3' ? 'selected' : ''}>
          Proyectos
        </option>

        <option value="4" ${String(data.id_categoria_noticia) === '4' ? 'selected' : ''}>
          Institucional
        </option>

        <option value="5" ${String(data.id_categoria_noticia) === '5' ? 'selected' : ''}>
          Eventos
        </option>

      </select>
    </div>

    <div class="flex flex-wrap gap-3 pt-2">
      <button
        class="btn-primary rounded-full px-5 py-3 font-semibold"
        type="submit">
        ${model ? 'Actualizar noticia' : 'Crear noticia'}
      </button>

      ${model
        ? '<button type="button" data-reset-form class="rounded-full px-5 py-3 font-semibold border border-slate-200">Cancelar</button>'
        : ''
      }
    </div>
  `;
}

    function proyectoForm(model) {
      const data = model || { nombre: '', descripcion: '', fecha_inicio: '', fecha_fin: '', estado: '', beneficiarios: '', imagen: '' };
      return `
        <input type="hidden" name="id" value="${escapeHtml(data.id || '')}" />
        <div>
          <label class="text-sm font-semibold text-slate-600">Nombre *</label>
          <input class="field mt-2" name="nombre" required value="${escapeHtml(data.nombre)}" />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-600">Descripción *</label>
          <textarea class="field mt-2 min-h-40" name="descripcion" required>${escapeHtml(data.descripcion)}</textarea>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-slate-600">Fecha inicio *</label>
            <input class="field mt-2" type="date" name="fecha_inicio" required value="${escapeHtml((data.fecha_inicio || '').slice(0, 10))}" />
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-600">Fecha fin *</label>
            <input class="field mt-2" type="date" name="fecha_fin" required value="${escapeHtml((data.fecha_fin || '').slice(0, 10))}" />
          </div>
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-600">Estado *</label>
          <input class="field mt-2" name="estado" required value="${escapeHtml(data.estado)}" />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-600">Beneficiarios *</label>
          <input class="field mt-2" name="beneficiarios" required value="${escapeHtml(data.beneficiarios)}" />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-600">Imagen *</label>
          <input class="field mt-2" name="imagen" required value="${escapeHtml(data.imagen)}" />
        </div>
        <div class="flex flex-wrap gap-3 pt-2">
          <button class="btn-primary rounded-full px-5 py-3 font-semibold" type="submit">${model ? 'Actualizar proyecto' : 'Crear proyecto'}</button>
          ${model ? '<button type="button" data-reset-form class="rounded-full px-5 py-3 font-semibold border border-slate-200">Cancelar</button>' : ''}
        </div>
      `;
    }

    function noticiasRows() {
      if (!appState.noticias.length) {
        return '<tr><td colspan="4" class="py-14 text-center text-slate-400">No hay noticias registradas</td></tr>';
      }

      return appState.noticias.map(function (item) {
        return `
          <tr class="border-b border-slate-100 align-top">
            <td class="py-4 pr-4">
              <div class="font-semibold text-slate-900">${escapeHtml(item.titulo)}</div>
              <div class="text-xs text-slate-500 max-w-xl">${escapeHtml((item.contenido || '').slice(0, 110))}</div>
            </td>
            <td class="py-4 pr-4 whitespace-nowrap">${formatDate(item.fecha)}</td>
            <td class="py-4 pr-4">${escapeHtml(item.nombre_categoria || item.id_categoria_noticia)}</td>
            <td class="py-4 pr-4">
              <div class="flex gap-2">
                <button class="px-3 py-1.5 rounded-full border border-slate-200 text-sm font-semibold" data-edit-noticia="${item.id}">Editar</button>
                <button class="px-3 py-1.5 rounded-full bg-red-600 text-white text-sm font-semibold" data-delete-noticia="${item.id}">Eliminar</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function proyectosRows() {
      if (!appState.proyectos.length) {
        return '<tr><td colspan="5" class="py-14 text-center text-slate-400">No hay proyectos registrados</td></tr>';
      }

      return appState.proyectos.map(function (item) {
        return `
          <tr class="border-b border-slate-100 align-top">
            <td class="py-4 pr-4">
              <div class="font-semibold text-slate-900">${escapeHtml(item.nombre)}</div>
              <div class="text-xs text-slate-500 max-w-xl">${escapeHtml((item.descripcion || '').slice(0, 110))}</div>
            </td>
            <td class="py-4 pr-4 whitespace-nowrap">${formatDate(item.fecha_inicio)} - ${formatDate(item.fecha_fin)}</td>
            <td class="py-4 pr-4">${escapeHtml(item.estado)}</td>
            <td class="py-4 pr-4">${escapeHtml(item.beneficiarios)}</td>
            <td class="py-4 pr-4">
              <div class="flex gap-2">
                <button class="px-3 py-1.5 rounded-full border border-slate-200 text-sm font-semibold" data-edit-proyecto="${item.id}">Editar</button>
                <button class="px-3 py-1.5 rounded-full bg-red-600 text-white text-sm font-semibold" data-delete-proyecto="${item.id}">Eliminar</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderView() {
      navLinks.forEach(function (link) {
        link.classList.toggle('active', link.dataset.view === appState.view);
      });

      if (appState.view === 'dashboard') {
        content.innerHTML = dashboardView();
        return;
      }

      if (appState.view === 'noticias') {
        content.innerHTML = `
          <section class="grid gap-6 xl:grid-cols-[minmax(0,1.1fr)_minmax(0,0.9fr)]">
            <div class="card bg-white p-6 md:p-7">
              <div class="flex items-start justify-between gap-4 mb-5">
                <div>
                  <h2 class="text-2xl font-bold text-slate-900">Noticias</h2>
                  <p class="text-slate-500 mt-1">Gestiona el contenido de la página pública de noticias.</p>
                </div>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead class="text-xs uppercase tracking-wider text-slate-400 border-b border-slate-200">
                    <tr>
                      <th class="py-3 pr-4">Título</th>
                      <th class="py-3 pr-4">Fecha</th>
                      <th class="py-3 pr-4">Categoría</th>
                      <th class="py-3 pr-4">Acciones</th>
                    </tr>
                  </thead>
                  <tbody class="text-slate-700">${noticiasRows()}</tbody>
                </table>
              </div>
            </div>
            <div class="card bg-white p-6 md:p-7">
              <form id="noticia-form" class="space-y-4" novalidate>
                ${noticiaForm(appState.editingNoticiaId ? appState.noticias.find((item) => String(item.id) === String(appState.editingNoticiaId)) : null)}
              </form>
            </div>
          </section>
        `;
        return;
      }

      if (appState.view === 'proyectos') {
        content.innerHTML = `
          <section class="grid gap-6 xl:grid-cols-[minmax(0,1.1fr)_minmax(0,0.9fr)]">
            <div class="card bg-white p-6 md:p-7">
              <div class="flex items-start justify-between gap-4 mb-5">
                <div>
                  <h2 class="text-2xl font-bold text-slate-900">Proyectos</h2>
                  <p class="text-slate-500 mt-1">Gestiona el contenido de la sección pública de proyectos.</p>
                </div>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead class="text-xs uppercase tracking-wider text-slate-400 border-b border-slate-200">
                    <tr>
                      <th class="py-3 pr-4">Nombre</th>
                      <th class="py-3 pr-4">Fechas</th>
                      <th class="py-3 pr-4">Estado</th>
                      <th class="py-3 pr-4">Beneficiarios</th>
                      <th class="py-3 pr-4">Acciones</th>
                    </tr>
                  </thead>
                  <tbody class="text-slate-700">${proyectosRows()}</tbody>
                </table>
              </div>
            </div>
            <div class="card bg-white p-6 md:p-7">
              <form id="proyecto-form" class="space-y-4" novalidate>
                ${proyectoForm(appState.editingProyectoId ? appState.proyectos.find((item) => String(item.id) === String(appState.editingProyectoId)) : null)}
              </form>
            </div>
          </section>
        `;
      }
    }

    async function loadNoticias() {
      appState.noticias = await requestJson('/api/noticias');
    }

    async function loadProyectos() {
      appState.proyectos = await requestJson('/api/proyectos');
    }

    async function loadData(view) {
      setStatus('Cargando datos...');
      if (view === 'dashboard' || view === 'noticias') {
        await loadNoticias();
      }
      if (view === 'dashboard' || view === 'proyectos') {
        await loadProyectos();
      }
      setStatus('Datos actualizados');
    }

    function resetEditing() {
      appState.editingNoticiaId = null;
      appState.editingProyectoId = null;
      renderView();
      bindEvents();
    }

    async function saveNoticia(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      if (!data.titulo || !data.subtitulo || !data.fecha || !data.contenido || !data.imagen_portada || !data.id_categoria_noticia) {
        throw new Error('Todos los campos de noticia son obligatorios');
      }

      const endpoint = data.id ? `/api/noticias/${data.id}` : '/api/noticias';
      const method = data.id ? 'PUT' : 'POST';
      delete data.id;

      await requestJson(endpoint, {
        method,
        body: JSON.stringify(data),
      });

      await loadNoticias();
      appState.editingNoticiaId = null;
      renderView();
      bindEvents();
      setStatus('Noticia guardada');
    }

    async function saveProyecto(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      if (!data.nombre || !data.descripcion || !data.fecha_inicio || !data.fecha_fin || !data.estado || !data.beneficiarios || !data.imagen) {
        throw new Error('Todos los campos de proyecto son obligatorios');
      }

      const endpoint = data.id ? `/api/proyectos/${data.id}` : '/api/proyectos';
      const method = data.id ? 'PUT' : 'POST';
      delete data.id;

      await requestJson(endpoint, {
        method,
        body: JSON.stringify(data),
      });

      await loadProyectos();
      appState.editingProyectoId = null;
      renderView();
      bindEvents();
      setStatus('Proyecto guardado');
    }

    async function deleteNoticia(id) {
      if (!confirm('¿Eliminar esta noticia?')) return;
      await requestJson(`/api/noticias/${id}`, { method: 'DELETE' });
      await loadNoticias();
      renderView();
      bindEvents();
      setStatus('Noticia eliminada');
    }

    async function deleteProyecto(id) {
      if (!confirm('¿Eliminar este proyecto?')) return;
      await requestJson(`/api/proyectos/${id}`, { method: 'DELETE' });
      await loadProyectos();
      renderView();
      bindEvents();
      setStatus('Proyecto eliminado');
    }

    function editNoticia(id) {
      appState.view = 'noticias';
      appState.editingNoticiaId = id;
      renderView();
      bindEvents();
      setStatus('Editando noticia');
    }

    function editProyecto(id) {
      appState.view = 'proyectos';
      appState.editingProyectoId = id;
      renderView();
      bindEvents();
      setStatus('Editando proyecto');
    }

    function bindEvents() {
      document.querySelectorAll('[data-edit-noticia]').forEach(function (button) {
        button.addEventListener('click', function () {
          editNoticia(button.dataset.editNoticia);
        });
      });

      document.querySelectorAll('[data-delete-noticia]').forEach(function (button) {
        button.addEventListener('click', function () {
          deleteNoticia(button.dataset.deleteNoticia);
        });
      });

      document.querySelectorAll('[data-edit-proyecto]').forEach(function (button) {
        button.addEventListener('click', function () {
          editProyecto(button.dataset.editProyecto);
        });
      });

      document.querySelectorAll('[data-delete-proyecto]').forEach(function (button) {
        button.addEventListener('click', function () {
          deleteProyecto(button.dataset.deleteProyecto);
        });
      });

      const noticiaFormEl = document.getElementById('noticia-form');
      if (noticiaFormEl) {
        noticiaFormEl.addEventListener('submit', async function (event) {
          event.preventDefault();
          try {
            await saveNoticia(noticiaFormEl);
          } catch (error) {
            alert(error.message);
          }
        });

        noticiaFormEl.querySelector('[data-reset-form]')?.addEventListener('click', resetEditing);
      }

      const proyectoFormEl = document.getElementById('proyecto-form');
      if (proyectoFormEl) {
        proyectoFormEl.addEventListener('submit', async function (event) {
          event.preventDefault();
          try {
            await saveProyecto(proyectoFormEl);
          } catch (error) {
            alert(error.message);
          }
        });

        proyectoFormEl.querySelector('[data-reset-form]')?.addEventListener('click', resetEditing);
      }
    }

    async function loadView(view) {
      appState.view = view;
      appState.editingNoticiaId = null;
      appState.editingProyectoId = null;
      await loadData(view);
      renderView();
      bindEvents();
    }

    navLinks.forEach(function (link) {
      link.addEventListener('click', async function (event) {
        event.preventDefault();
        await loadView(link.dataset.view);
      });
    });

    (async function init() {
      const authenticated = await ensureAuthenticated();

      if (!authenticated) {
        return;
      }

      await loadView('dashboard');
    })();
  </script>
</body>

</html>
