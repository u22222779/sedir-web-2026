<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SEDIR - Últimas Noticias</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sedir-green': '#00944a',
                        'sedir-dark-green': '#006a49',
                        'sedir-orange': '#f09734',
                        'sedir-gray': '#4a5568',
                        'sedir-light-gray': '#f7fafc',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="../activos/css/style.css" rel="stylesheet" />
    <link href="../activos/css/navbar.css" rel="stylesheet" />
    <link href="../activos/css/hero.css" rel="stylesheet" />
    <link href="../activos/css/noticias.css" rel="stylesheet" />
    <link href="../activos/css/cards.css" rel="stylesheet" />
    <link href="../activos/css/footer.css" rel="stylesheet" />
    <link href="../activos/css/responsive.css" rel="stylesheet" />

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Open+Sans:wght@400;600&amp;display=swap"
        rel="stylesheet" />
</head>

<body class="bg-white text-gray-800 noticias-page">
    <div id="navbar-container" class="navbar-loading" data-component="/components/navbar.html"></div>
    <div id="hero-container" data-component="/components/hero-noticias.html"></div>

    <main class="container mx-auto px-4 py-8 max-w-7xl">
        <div id="filtros-container" data-component="/components/filtros-noticias.html"></div>
        <div id="cards-template-container" data-component="/components/card-noticia.html" hidden></div>
        <div id="news-cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <!-- Video modal: opens in a large rectangle when a news card is clicked -->
    <div id="news-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div id="news-modal-backdrop" class="absolute inset-0 bg-black/70"></div>
        <div class="relative z-10 w-[350px] h-[620px] max-w-none">
            <button id="news-modal-close"
                class="absolute -top-3 -right-3 z-20 bg-black/70 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg">✕</button>
            <div class="w-full h-full bg-black rounded-[20px] overflow-hidden shadow-2xl">
                <div id="news-modal-content" class="w-full h-full"></div>
            </div>
        </div>
    </div>

    <div id="footer-container" data-component="/components/footer.html"></div>

    <script src="/activos/js/components.js" defer></script>
    <script src="/activos/js/navbar.js" defer></script>
    <script src="/activos/js/filtros.js" defer></script>
    <script src="/activos/js/noticias.js" defer></script>
    <script src="/activos/js/main.js" defer></script>
    <div id="whatsapp-container" data-component="/components/whatsapp.html"></div>
</body>

</html>
