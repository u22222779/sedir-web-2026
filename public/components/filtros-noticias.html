<!-- COMPONENT: Filtros Noticias -->
<div class="flex flex-col sm:flex-row items-center gap-4 border-b border-gray-200 pb-6 mb-8">
  <span class="text-gray-600 font-semibold font-montserrat">Filtrar por:</span>
  <div class="flex flex-wrap gap-2">
    <button type="button"
      class="news-filter-btn is-active"
      data-filter="all">Todos</button>
    <button type="button"
      class="news-filter-btn"
      data-filter="1">Agricultura</button>
    <button type="button"
      class="news-filter-btn"
      data-filter="2">Capacitación</button>
    <button type="button"
      class="news-filter-btn"
      data-filter="3">Proyectos</button>
    <button type="button"
      class="news-filter-btn"
      data-filter="4">Institucional</button>
    <button type="button"
      class="news-filter-btn"
      data-filter="5">Eventos</button>
  </div>
</div>
