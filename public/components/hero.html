<style>
/* ==========================
   HERO SLIDESHOW
========================== */

.hero-home{
    position:relative;
    width:100%;
    height:550px;
    overflow:hidden;
    background:#000306;
}

#heroSlideshow{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.hero-slide{
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
    object-position:center 40%;

    opacity:0;

    animation:heroFade 30s infinite;
}

/* Imagen 1 */
.hero-slide:nth-child(1){
    animation-delay:0s;
}

/* Imagen 2 */
.hero-slide:nth-child(2){
    animation-delay:4s;
}

/* Imagen 3 */
.hero-slide:nth-child(3){
    animation-delay:8s;
}

/* Imagen 4 */
.hero-slide:nth-child(4){
    animation-delay:12s;
}

/* Imagen 5 */
.hero-slide:nth-child(5){
    animation-delay:16s;
}

/* Imagen 6 */
.hero-slide:nth-child(6){
    animation-delay:20s;
}

@keyframes heroFade{

    0%{
        opacity:0;
    }

    4%{
        opacity:1;
    }

    16%{
        opacity:1;
    }

    20%{
        opacity:0;
    }

    100%{
        opacity:0;
    }

}

@media (max-width:768px){

    .hero-home{
        height:420px;
    }

    .hero-slide{
        object-position:center 30%;
    }

}
</style>

<section class="hero-home">

    <div id="heroSlideshow">

        <img
            class="hero-slide"
            src="activos/img_portada/Sem4-Portada01.jpg"
            alt="Imagen 1">

        <img
            class="hero-slide"
            src="activos/img_portada/Sem4-Portada02.jpg"
            alt="Imagen 2">

        <img
            class="hero-slide"
            src="activos/img_portada/Sem4-Portada03.jpg"
            alt="Imagen 3">

        <img
            class="hero-slide"
            src="activos/img_portada/Sem4-Portada04.jpg"
            alt="Imagen 4">

        <img
            class="hero-slide"
            src="activos/img_portada/Sem4-Portada05.jpg"
            alt="Imagen 5">

        <img
            class="hero-slide"
            src="activos/img_portada/Sem5-Portada01.jpg"
            alt="Imagen 6">

    </div>

    <!-- Degradado -->
    <div class="absolute inset-x-0 top-0 h-40 bg-gradient-to-b from-black/40 to-transparent pointer-events-none"></div>

</section>
