<style>
/* ==========================
   HERO SLIDESHOW
========================== */

.hero-home{
    position:relative;
    width:100%;
    height:550px;
    overflow:hidden;
    background:#000306;
    box-shadow:0 12px 24px -8px rgba(0,0,0,.35);
}

#heroSlideshow{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.hero-video{
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
    object-position:center 40%;
}

.hero-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
    pointer-events:none;
}

@media (max-width:768px){

    .hero-home{
        height:420px;
    }

    .hero-video{
        object-position:center 30%;
    }

}
</style>

<section class="hero-home">

    <div id="heroSlideshow">

        <video
            id="heroVideo"
            class="hero-video"
            autoplay
            muted
            playsinline
            preload="auto">

            <source src="activos/videos/VIDEO.mp4" type="video/mp4">

        </video>

    </div>

    <div class="hero-overlay"></div>

    <div class="absolute inset-x-0 top-0 h-40 bg-gradient-to-b from-black/40 to-transparent pointer-events-none"></div>

</section>

<script>

(function(){

    const video = document.getElementById("heroVideo");

    if(!video) return;

    const INICIO = 6;
    const FIN = 88;

    // Cuando el video ya tiene la metadata
    video.addEventListener("loadedmetadata", function(){

        video.currentTime = INICIO;

    });

    // Cuando ya puede reproducirse
    video.addEventListener("canplay", function(){

        video.play().catch(()=>{});

    });

    // Bucle manual
    video.addEventListener("timeupdate", function(){

        if(video.currentTime >= FIN){

            video.currentTime = INICIO;

            video.play().catch(()=>{});

        }

    });

    // Si llega al final del archivo
    video.addEventListener("ended", function(){

        video.currentTime = INICIO;

        video.play().catch(()=>{});

    });

    // Si al momento de correr este script el video ya tenia metadata cargada
    // (puede pasar si el navegador cacheo el video), forzamos el inicio ya mismo.
    if (video.readyState >= 1 && video.currentTime < INICIO) {
        video.currentTime = INICIO;
    }

})();

</script>
