<!-- Enlace a tus fuentes de Montserrat y Franklin Gothic Demi -->
<link href="../activos/css/fonts.css" rel="stylesheet" />

<style>
    /* ==========================================
       1. VARIABLES, PALETA & TIPOGRAFÍAS
    ========================================== */
    :root {
        --color-primario: #00944a;       /* Verde Principal */
        --color-primario-oscuro: #006A49;/* Verde Oscuro */
        --color-tierra: #8C7855;         /* Tono Tierra / Cosecha */
        --color-secundario-verde: #009C63;
        --color-fondo-oscuro: #000306;   /* Fondo negro/azul profundo */
        --color-acento-naranja: #F09734; /* Naranja Vibrante */

        --font-montserrat: 'Montserrat', sans-serif;
        --font-franklin: 'Franklin Gothic Demi', 'Franklin Gothic', sans-serif;
    }

    .hero-home * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* ==========================================
       2. CONTENEDOR PANTALLA COMPLETA
    ========================================= */
    .hero-home {
        position: relative;
        width: 100%;
        height: 100vh;
        height: 100dvh; 
        min-height: 520px; 
        overflow: hidden;
        background-color: var(--color-fondo-oscuro);
        box-shadow: 0 12px 30px rgba(0, 3, 6, 0.5);
    }

    #heroSlideshow {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }

    .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 35%; 
    }

    /* ==========================================
       3. OVERLAYS DEGRADADOS (ACLARADOS / OPCIÓN 1)
    ========================================= */
    /* Capa general: casi invisible, solo quita el brillo excesivo (bajó de 0.45 a 0.25) */
    .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            135deg, 
            rgba(0, 3, 6, 0.05) 0%, 
            rgba(0, 3, 6, 0.25) 100%
        );
        pointer-events: none;
        z-index: 1;
    }

    /* Degradado inferior: sombra ligera solo tras el texto (bajó de 0.85 a 0.55) */
    .hero-content-gradient {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60%; 
        background: linear-gradient(
            to top, 
            rgba(0, 3, 6, 0.55) 0%, 
            rgba(0, 3, 6, 0.15) 50%, 
            transparent 100%
        );
        pointer-events: none;
        z-index: 1;
    }

    /* Degradado superior: sombra suave para que el menú del sitio se lea bien (bajó de 0.60 a 0.35) */
    .hero-top-gradient {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 140px;
        background: linear-gradient(to bottom, rgba(0, 3, 6, 0.35) 0%, transparent 100%);
        pointer-events: none;
        z-index: 1;
    }

    /* ==========================================
       4. CONTENIDO (ESCRITORIO: CENTRADO VERTICAL, IZQUIERDA)
    ========================================= */
    .hero-content {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center; 
        justify-content: flex-start;
        padding: 0 8%;
    }

    .hero-info {
        width: 100%;
        max-width: 780px; 
        text-align: left;
        opacity: 0;
        animation: heroFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.3s;
    }

    .hero-description {
        font-family: var(--font-montserrat);
        font-weight: 600; 
        font-size: clamp(1.75rem, 3.5vw, 3.1rem); 
        line-height: 1.3; 
        color: #FFFFFF;
        text-wrap: balance;
        /* Sombra de texto reforzada un poquito para proteger la lectura al haber menos oscuridad detrás */
        text-shadow: 0 3px 14px rgba(0, 3, 6, 0.9); 
    }

    .text-highlight {
        font-family: var(--font-franklin);
        font-weight: 400; 
        color: var(--color-acento-naranja);
        letter-spacing: -0.015em; 
        text-shadow: 0 2px 12px rgba(240, 151, 52, 0.4), 0 3px 14px rgba(0, 3, 6, 0.95);
    }

    .hero-info::after {
        content: '';
        display: block;
        width: 90px; 
        height: 3.5px; 
        margin-top: 1.6rem;
        background: linear-gradient(to right, var(--color-primario), var(--color-tierra));
        border-radius: 99px;
        box-shadow: 0 2px 6px rgba(0, 3, 6, 0.5);
    }

    /* ==========================================
       5. ANIMACIONES
    ========================================= */
    @keyframes heroFadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
/* ==========================================
       6. MÓVIL Y TABLET: CENTRADO ABSOLUTO
    ========================================= */
    @media (max-width: 768px) {
        .hero-video {
            object-position: center 30%;
        }

        .hero-content {
            padding: 0 5%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;       
            text-align: center;
        }

        .hero-info {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* --- TAMAÑO DE TEXTO AUMENTADO PARA MÓVIL --- */
        .hero-description {
            width: 100%;
            text-align: center;
            margin: 0 auto;
            /* Mínimo de 1.75rem (28px) en teléfonos normales, escala dinámica 
               a 7.5vw y alcanza hasta 2.5rem (40px) en tablets o pantallas anchas */
            font-size: clamp(1.75rem, 7.5vw, 2.5rem); 
            line-height: 1.2; /* Interlineado compacto para que no ocupe demasiada altura */
            letter-spacing: -0.015em;
        }

        .hero-info::after {
            margin: 1.2rem auto 0; 
            width: 60px;
        }
    }

    /* --- AJUSTE DE SEGURIDAD PARA TELÉFONOS MUY PEQUEÑOS (ej. iPhone SE) --- */
    @media (max-width: 380px) {
        .hero-description {
            /* Sube de 1.35rem a 1.5rem (24px) en pantallas estrechas */
            font-size: 1.5rem; 
            line-height: 1.2;
        }
    }
</style>

<section class="hero-home" aria-label="Innovación y Desarrollo para la Agricultura">
    <div id="heroSlideshow">
        <video id="heroVideo" class="hero-video" autoplay muted playsinline preload="auto" aria-hidden="true">
            <source src="activos/videos/VIDEO.mp4" type="video/mp4">
            Su navegador no soporta el video de fondo.
        </video>
    </div>

    <div class="hero-overlay"></div>
    <div class="hero-top-gradient"></div>
    <div class="hero-content-gradient"></div>

    <div class="hero-content">
        <div class="hero-info">
            <p class="hero-description">
                Innovación y desarrollo tecnológico para la
                <span class="text-highlight">agricultura familiar</span>
                y el
                <span class="text-highlight">desarrollo rural sostenible</span>.
            </p>
        </div>
    </div>
</section>

<script>
    (function () {
        const video = document.getElementById("heroVideo");
        if (!video) return;

        const INICIO = 6;
        const FIN = 88;

        video.addEventListener("loadedmetadata", function () {
            if (video.duration >= INICIO) {
                video.currentTime = INICIO;
            }
        });

        const startPlay = () => {
            video.play().catch(error => {
                console.warn("Autoplay de video intervenido por el navegador:", error);
            });
        };

        video.addEventListener("canplay", startPlay, { once: true });

        video.addEventListener("timeupdate", function () {
            if (video.currentTime >= FIN || video.currentTime < INICIO - 1) {
                video.currentTime = INICIO;
                startPlay();
            }
        });

        video.addEventListener("ended", function () {
            video.currentTime = INICIO;
            startPlay();
        });
    })();
</script>
