<script>
  (function () {
    function ensureCorrectVideoSource() {
      const video = document.getElementById('heroVideo');
      if (!video || video.dataset.srcResolved) return;
      video.dataset.srcResolved = 'true';

      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      const desiredSrc = isMobile ? video.dataset.mobileSrc : video.dataset.desktopSrc;

      // Si el <source> activo no coincide con el que corresponde al viewport
      // (algunos navegadores no re-evalúan bien el atributo media en <video>),
      // forzamos el src correcto manualmente.
      const currentSrc = video.currentSrc || video.querySelector('source')?.src || '';
      if (!currentSrc || !currentSrc.endsWith(desiredSrc.split('/').pop())) {
        video.innerHTML = `<source src="${desiredSrc}" type="video/mp4">`;
        video.load();
      }
    }

    function initHeroVideo() {
      const video = document.getElementById('heroVideo');
      if (!video || video.dataset.initialized) return;
      video.dataset.initialized = 'true';

      const startTime = parseFloat(video.dataset.start); // 70s = 1:10
      const endTime = parseFloat(video.dataset.end);      // 310s = 5:10

      const setStart = () => {
        if (video.currentTime < startTime || video.currentTime >= endTime) {
          video.currentTime = startTime;
        }
      };

      video.addEventListener('loadedmetadata', setStart);
      video.addEventListener('canplay', setStart, { once: true });

      video.addEventListener('timeupdate', () => {
        if (video.currentTime >= endTime) {
          video.currentTime = startTime;
        }
      });

      // Si el metadata ya estaba disponible antes de registrar el listener
      if (video.readyState >= 1) setStart();
    }

    function updateIcon(video) {
      const btn = document.getElementById('soundToggle');
      const iconMuted = document.getElementById('iconMuted');
      const iconUnmuted = document.getElementById('iconUnmuted');
      if (!btn || !iconMuted || !iconUnmuted) return;

      if (video.muted) {
        iconMuted.classList.remove('hidden');
        iconUnmuted.classList.add('hidden');
        btn.setAttribute('aria-label', 'Activar sonido');
      } else {
        iconMuted.classList.add('hidden');
        iconUnmuted.classList.remove('hidden');
        btn.setAttribute('aria-label', 'Silenciar');
      }
    }

    // Delegación de eventos: funciona aunque el botón se inserte después,
    // o si el script se ejecuta antes de que exista el elemento en el DOM.
    document.addEventListener('click', function (e) {
      const btn = e.target.closest('#soundToggle');
      if (!btn) return;

      const video = document.getElementById('heroVideo');
      if (!video) return;

      video.muted = !video.muted;
      video.volume = 1;

      if (!video.muted) {
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            // Si el navegador bloquea, forzamos mute de nuevo para no
            // dejar el ícono desincronizado del estado real
            video.muted = true;
            updateIcon(video);
          });
        }
      }

      updateIcon(video);
    });

    // Inicializa el source correcto y el recorte de tiempo del video en
    // cuanto exista en el DOM
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        ensureCorrectVideoSource();
        initHeroVideo();
      });
    } else {
      ensureCorrectVideoSource();
      initHeroVideo();
    }

    // Respaldo: si el componente se inyecta dinámicamente después de
    // DOMContentLoaded (común en sistemas de includes/fetch), revisamos
    // periódicamente hasta encontrarlo.
    const observer = new MutationObserver(() => {
      const video = document.getElementById('heroVideo');
      if (video && !video.dataset.initialized) {
        ensureCorrectVideoSource();
        initHeroVideo();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  })();
</script>
