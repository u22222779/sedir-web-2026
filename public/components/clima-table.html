<!-- COMPONENT: Clima Historical Table -->
<section class="space-y-4 clima-page-section">
  <div class="flex justify-between items-end mb-4">
    <h2 class="font-headline-md text-headline-md text-on-surface">Datos históricos (últimos 7 días)</h2>
    <!-- COMPONENT: Clima Historical Table -->
    <section class="space-y-4 clima-page-section">

      <div class="flex justify-between items-end mb-4">
        <h2 class="font-headline-md text-headline-md text-on-surface">
          Datos históricos (últimos 7 días)
        </h2>

        <button
          class="bg-primary text-on-primary hover:bg-primary/90 transition-colors rounded-full px-4 py-2 font-label-md text-sm flex items-center gap-2"
          type="button">
          <span class="material-symbols-outlined text-sm">download</span>
          Descargar CSV
        </button>
      </div>

      <!-- TABLE CON SCROLL RESPONSIVE -->
      <div class="glass-card rounded-xl overflow-x-auto w-full">

        <table class="w-full text-left border-collapse clima-history-table min-w-[700px]">

          <thead>
            <tr>
              <th class="p-3">Fecha</th>
              <th class="p-3">Temp. Máx (°C)</th>
              <th class="p-3">Temp. Mín (°C)</th>
              <th class="p-3">Humedad (%)</th>
              <th class="p-3">Viento (km/h)</th>
              <th class="p-3">Precip. (mm)</th>
            </tr>
          </thead>

          <tbody id="clima-history-body" class="divide-y divide-outline-variant/30 text-on-surface-variant">
          </tbody>

        </table>
      </div>

    </section>

    <!-- TEMPLATE -->
    <template id="clima-history-row-template">
      <tr class="hover:bg-black/5 transition">
        <td class="p-3">{{date}}</td>
        <td class="p-3">{{maxTemp}}</td>
        <td class="p-3">{{minTemp}}</td>
        <td class="p-3">{{humidity}}</td>
        <td class="p-3">{{wind}}</td>
        <td class="p-3">{{rain}}</td>
      </tr>
    </template>
    <style>
      .clima-history-table {
        width: 100%;
      }

      @media (max-width: 768px) {
        .clima-history-table {
          font-size: 12px;
        }

        .clima-history-table td,
        .clima-history-table th {
          padding: 8px;
        }
      }
    </style>
</section>
